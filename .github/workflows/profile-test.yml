name: HAXPES Bluesky Profile Testing

on:
  pull_request:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  pods-smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NBS_COLLECTION_PACKAGES: ${{ github.workspace }}/collection_packages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          cache: true
          environments: pods

      - name: Pods CLI smoke test
        shell: bash
        run: |
          set -euo pipefail

          echo "==== Host memory before pods smoke test ===="
          free -h || true
          cat /proc/meminfo | sed -n '1,20p' || true

          mkdir -p "${NBS_COLLECTION_PACKAGES}"

          pixi run -e pods pods -- --help
          pixi run -e pods podman-compose --version || true

          pixi run -e pods pods-list | tee pods-list.txt
          grep -q "Available services" pods-list.txt

      - name: Start bluesky-services
        shell: bash
        run: |
          set -euo pipefail

          echo "==== Host memory before bluesky-services start ===="
          free -h || true

          podman --version
          podman info --debug || true

          pixi run -e pods pods-start bluesky-services

          for i in $(seq 1 60); do
            echo "wait_iter=${i}"
            timeout 10s podman ps --format '{{.Names}}' | tee podman-ps.txt
            if grep -q "bluesky-services_mongo" podman-ps.txt && grep -q "bluesky-services_kafka" podman-ps.txt; then
              exit 0
            fi
            sleep 2
          done

          echo "Timed out waiting for bluesky-services to be running." >&2
          podman ps -a || true
          podman logs --tail 200 $(podman ps -aq) || true
          exit 1

      - name: Start sim
        shell: bash
        run: |
          set -euo pipefail

          echo "==== Host memory before sim start ===="
          free -h || true

          pixi run -e pods pods-start --dev sim

          for _ in $(seq 1 60); do
            timeout 10s podman ps --format '{{.Names}}' | tee podman-ps.txt
            if grep -q "nbs-sim" podman-ps.txt; then
              exit 0
            fi
            sleep 2
          done

          echo "Timed out waiting for sim to be running." >&2
          podman ps -a || true
          podman logs --tail 200 $(podman ps -aq) || true
          exit 1

      - name: Start queueserver
        shell: bash
        run: |
          set -euo pipefail

          echo "==== Host memory before queueserver start ===="
          free -h || true

          pixi run -e pods pods-start --dev queueserver

          for _ in $(seq 1 60); do
            timeout 10s podman ps --format '{{.Names}}' | tee podman-ps.txt
            if grep -q "acq_qs" podman-ps.txt; then
              exit 0
            fi
            sleep 2
          done

          echo "Timed out waiting for queueserver to be running." >&2
          podman ps -a || true
          podman logs --tail 200 $(podman ps -aq) || true
          exit 1

      - name: Run qs pytest inside queueserver container
        shell: bash
        run: |
          set -euo pipefail

          echo "==== Host memory before qs-pytest ===="
          free -h || true
          vmstat 1 5 || true
          echo "==== Podman stats before qs-pytest ===="
          podman stats --no-stream || true

          QS_CONTAINER="$(podman ps --format '{{.Names}}' | grep -m1 'acq_qs')"
          echo "Using queueserver container: ${QS_CONTAINER}"

          podman exec "${QS_CONTAINER}" bash -lc 'cd /home/xf07id1/.ipython/profile_collection && pixi run -e qs qs-pytest'

      - name: Capture OOM diagnostics on failure
        if: ${{ failure() }}
        shell: bash
        run: |
          set -euo pipefail
          echo "==== Host memory after failure ===="
          free -h || true
          cat /proc/meminfo | sed -n '1,40p' || true
          echo "==== Podman stats after failure ===="
          podman stats --no-stream || true
          echo "==== Kernel messages (OOM hints) ===="
          dmesg | rg -i "out of memory|oom|killed process" || true

      - name: Tear down minimal pods
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          pixi run -e pods pods-stop queueserver sim bluesky-services || true
          podman ps -a || true

